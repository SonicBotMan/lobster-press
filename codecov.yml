codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "20...100"
  status:
    project:
      default:
        target: 50%
        threshold: 5%
        base: auto
    patch:
      default:
        target: 50%
        threshold: 5%

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: no

github_checks:
  annotations: yes

ignore:
  - "tests/**/*"
  - "**/__pycache__/**"
  - "**/migrations/**"
  - "src/llm_providers.py"  # LLM provider implementations, hard to test without API keys
