name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=20

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --cov=src --cov-append --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Installing dependencies..."
          npm install --verbose 2>&1 | head -100 || npm install
        continue-on-error: false

      - name: Build TypeScript
        run: npm run build
        continue-on-error: true

      - name: Run Node.js tests
        run: npm test
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install linting tools
        run: |
          pip install flake8 black isort mypy

      - name: Run Black
        run: black --check src/ tests/
        continue-on-error: true

      - name: Run isort
        run: isort --check-only src/ tests/
        continue-on-error: true

      - name: Run Flake8
        run: flake8 src/ tests/ --max-line-length=100 --exclude=src/llm_providers.py
        continue-on-error: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  # v4.0.22: 新增代码质量检查（Issue 改进计划）
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # P0: TypeScript 编译强制检查
      - name: TypeScript compilation check
        run: npx tsc --noEmit

      # P0: MCP 解析路径一致性检查
      - name: MCP parsing consistency check
        run: |
          echo "Checking for deprecated MCP parsing patterns..."
          # 检查是否使用了旧的 details.result 或 detail.details 路径
          # 排除 compress_result（合法字段名）和 data?.result（Python 层 assemble 工具特殊结构）
          if grep -n "details.*result\|detail\.details" index.ts | grep -v "compress_result" | grep -v "// "; then
            echo "❌ Found deprecated MCP parsing pattern (details.result or detail.details)"
            echo "   Use: result.content[0].text → JSON.parse"
            exit 1
          fi
          echo "✅ MCP parsing patterns are consistent"

      # P2: 空实现检测
      - name: Empty implementation detection
        run: |
          echo "Checking for empty implementations..."
          # 检查 TODO 后面紧跟 return 的情况
          if grep -n "// TODO" index.ts -A 2 | grep "return {"; then
            echo "⚠️  Found potential empty implementation after TODO"
            echo "   Consider implementing or throwing NotImplementedError"
          fi
          # 检查只有 return { xxx: true } 的方法
          if grep -n "return {$" index.ts -A 3 | grep -E "^\s+[a-z]+: true,$" | grep -v "count\|error\|reason"; then
            echo "⚠️  Found suspicious return { xxx: true } pattern"
            echo "   Make sure this is not an empty implementation"
          fi
          echo "✅ Empty implementation check complete"

      # P1: 版本号同步检查
      - name: Version sync check
        run: |
          echo "Checking version sync across files..."
          PACKAGE_VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": "\([^"]*\)".*/\1/')
          echo "package.json version: $PACKAGE_VERSION"
          
          # 检查 database.py
          DB_VERSION=$(grep "Version:" src/database.py | sed 's/.*Version: v\([0-9.]*\).*/\1/')
          echo "database.py version: $DB_VERSION"
          
          if [ "$PACKAGE_VERSION" != "$DB_VERSION" ]; then
            echo "❌ Version mismatch between package.json and database.py"
            exit 1
          fi
          echo "✅ Version sync check passed"
